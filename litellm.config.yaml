model_list:
  # ── Claude Code internal model names ──────────────────────────────────────
  # Claude Code CLI sends these exact model IDs internally. Map them all to
  # Gemini so every request routes through the proxy correctly.

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: claude-sonnet-4-5-20250929
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
