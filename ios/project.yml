name: Boop
options:
  bundleIdPrefix: dev.boop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: targeted
targets:
  Boop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Boop
        excludes:
          - "**/.DS_Store"
          # TEMP: actool refuses to thin a 26.5-SDK asset catalog against a
          # 26.4 simulator runtime. Lucide PDFs render from raw bundle
          # resources via PDFKit instead (see LucideIcon.swift). Re-include
          # this and remove the workaround once iOS 26.5 sim runtime ships.
          - "Resources/Assets.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.boop.Boop
        INFOPLIST_FILE: Boop/Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SDKROOT: iphoneos
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
schemes:
  Boop:
    build:
      targets:
        Boop: all
    run:
      config: Debug
    archive:
      config: Release
