name: Boop
options:
  bundleIdPrefix: dev.boop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "6"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: targeted
targets:
  Boop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Boop
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.boop.Boop
        INFOPLIST_FILE: Boop/Resources/Info.plist
        # Sandbox (development) APNs. Switch the value inside the
        # entitlements file to "production" before archiving for
        # TestFlight or App Store distribution.
        CODE_SIGN_ENTITLEMENTS: Boop/Resources/Boop.entitlements
        # The AppIcon set lives under Resources/Assets.xcassets. Xcode
        # compiles it via actool and writes CFBundleIconName for us.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_MACCATALYST: NO
        # iPhone-only per the office-hours plan; iPad orientations
        # aren't declared in Info.plist and App Store Connect rejects
        # iPad-targeted bundles missing them. Drop iPad now; revisit
        # if/when we ship iPad layouts.
        TARGETED_DEVICE_FAMILY: "1"
        SDKROOT: iphoneos
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
schemes:
  Boop:
    build:
      targets:
        Boop: all
    run:
      config: Debug
    archive:
      config: Release
